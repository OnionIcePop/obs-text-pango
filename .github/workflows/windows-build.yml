name: Build Windows

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:
    inputs:
      obs_version:
        description: OBS Studio tag to build against
        required: false
        default: 31.1.1
      build_type:
        description: CMake build type
        required: false
        default: RelWithDebInfo

env:
  OBS_VERSION: ${{ inputs.obs_version || '31.1.1' }}
  BUILD_TYPE: ${{ inputs.build_type || 'RelWithDebInfo' }}
  VCPKG_ROOT: C:\vcpkg
  VCPKG_BINARY_SOURCES: clear;x-gha,readwrite
  VCPKG_PANGO_STACK_CACHE_KEY: pango-cairo-fontconfig-freetype-x64-windows

jobs:
  windows-x64:
    name: Windows x64
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: Enable Visual Studio developer shell
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Set up Ninja
        uses: seanmiddleditch/gha-setup-ninja@v5

      - name: Export GitHub Actions cache for vcpkg
        uses: actions/github-script@v9.0.0
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '')
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '')

      - name: Restore vcpkg package cache
        uses: actions/cache@v4
        with:
          path: |
            C:\vcpkg\installed
            C:\vcpkg\packages
            C:\vcpkg\downloads
          key: ${{ runner.os }}-${{ env.VCPKG_PANGO_STACK_CACHE_KEY }}-${{ hashFiles('.github/workflows/windows-build.yml') }}
          restore-keys: |
            ${{ runner.os }}-${{ env.VCPKG_PANGO_STACK_CACHE_KEY }}-

      - name: Create dependency directory
        shell: pwsh
        run: New-Item -ItemType Directory -Path deps -Force | Out-Null

      - parallel:
          - name: Install Pango stack with vcpkg
            shell: pwsh
            run: |
              vcpkg install `
                pango:x64-windows `
                cairo[fontconfig,freetype]:x64-windows `
                fontconfig:x64-windows `
                freetype:x64-windows

          - name: Download OBS Studio sources
            shell: pwsh
            run: |
              $obsTag = $env:OBS_VERSION
              $archive = "obs-studio-$obsTag.zip"
              Invoke-WebRequest `
                -Uri "https://github.com/obsproject/obs-studio/archive/refs/tags/$obsTag.zip" `
                -OutFile $archive
              Expand-Archive -Path $archive -DestinationPath deps
              Rename-Item -Path "deps/obs-studio-$obsTag" -NewName obs-studio

          - name: Download OBS Studio Windows runtime
            shell: pwsh
            run: |
              $obsTag = $env:OBS_VERSION
              $release = Invoke-RestMethod `
                -Headers @{ "User-Agent" = "GitHub Actions" } `
                -Uri "https://api.github.com/repos/obsproject/obs-studio/releases/tags/$obsTag"
              $asset = $release.assets |
                Where-Object { $_.name -match "Windows.*\.zip$" } |
                Select-Object -First 1
              if (-not $asset) {
                throw "Could not find an OBS Studio Windows zip asset for $obsTag."
              }
              Invoke-WebRequest -Uri $asset.browser_download_url -OutFile obs-runtime.zip
              Expand-Archive -Path obs-runtime.zip -DestinationPath deps/obs-runtime

      - name: Generate OBS import library
        shell: pwsh
        run: |
          $dll = Get-ChildItem deps/obs-runtime -Recurse -Include obs.dll,libobs.dll |
            Select-Object -First 1
          if (-not $dll) {
            throw "Could not find obs.dll or libobs.dll in the OBS Studio Windows runtime."
          }

          $exports = & dumpbin /nologo /exports $dll.FullName |
            ForEach-Object {
              if ($_ -match "^\s+\d+\s+[0-9A-Fa-f]+\s+[0-9A-Fa-f]+\s+([^\s=]+)") {
                $matches[1]
              }
            } |
            Where-Object { $_ } |
            Sort-Object -Unique

          if (-not $exports) {
            throw "Could not read exports from $($dll.FullName)."
          }

          @("LIBRARY $($dll.Name)", "EXPORTS") + $exports |
            Set-Content -Encoding ascii deps/obs.def
          lib /nologo /machine:x64 /def:deps/obs.def /out:deps/obs.lib

      - name: Configure plugin
        shell: pwsh
        run: |
          cmake -S . -B build -G Ninja `
            -DCMAKE_BUILD_TYPE=$env:BUILD_TYPE `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake" `
            -DCMAKE_INSTALL_PREFIX="$PWD/package" `
            -DOBS_INCLUDE_DIRS="$PWD/deps/obs-studio/libobs" `
            -DOBS_LIBRARIES="$PWD/deps/obs.lib"

      - name: Build plugin
        shell: pwsh
        run: cmake --build build --config $env:BUILD_TYPE

      - name: Install plugin layout
        shell: pwsh
        run: cmake --install build --config $env:BUILD_TYPE

      - name: Package artifact
        shell: pwsh
        run: |
          Compress-Archive -Path package/* -DestinationPath obs-text-pango-windows-x64.zip -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: obs-text-pango-windows-x64
          path: obs-text-pango-windows-x64.zip
